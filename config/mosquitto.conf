# Mosquitto MQTT Broker — hardened configuration
# Умная Усадьба Hermes

# ── Access Control ────────────────────────────────────────
# Require authentication — no anonymous access
listener 1883 0.0.0.0
allow_anonymous false
password_file /mosquitto/config/passwd

# ── Security ──────────────────────────────────────────────
# ACL: restrict topic access
acl_file /mosquitto/config/acl

# ── Persistence ───────────────────────────────────────────
persistence true
persistence_location /mosquitto/data
autosave_interval 300

# ── Connection Limits ─────────────────────────────────────
max_connections 50
max_inflight_messages 100
message_size_limit 102400

# ── Logging ───────────────────────────────────────────────
log_dest stdout
log_type warning
log_timestamp true
